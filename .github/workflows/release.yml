name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build desktop installers
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: linux
            runner: ubuntu-latest
            targetFlag: "--linux AppImage"
          - platform: windows
            runner: windows-latest
            targetFlag: "--win nsis"
          - platform: macos
            runner: macos-latest
            targetFlag: "--mac dmg"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate

      - name: Install dependencies
        run: pnpm install

      - name: Build desktop installer
        working-directory: apps/desktop
        run: pnpm run build:electron -- ${{ matrix.targetFlag }}

      - name: Collect installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.platform }}
          path: |
            dist/*.AppImage
            dist/*.exe
            dist/*.dmg
            dist/*.zip

  build-docs:
    name: Build docs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate

      - name: Install dependencies
        run: pnpm install

      - name: Build web app
        run: pnpm run build:web

      - name: Build docs static export
        env:
          NEXT_PUBLIC_BASE_PATH: /MightBeHuman
        run: pnpm run build:docs

      - name: Upload docs site
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: apps/docs/out

  release:
    name: Create Release and Publish Pages
    needs: [build-desktop, build-docs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download installers (linux)
        uses: actions/download-artifact@v4
        with:
          name: installers-linux
          path: ./dist

      - name: Download installers (windows)
        uses: actions/download-artifact@v4
        with:
          name: installers-windows
          path: ./dist

      - name: Download installers (macos)
        uses: actions/download-artifact@v4
        with:
          name: installers-macos
          path: ./dist

      - name: Download docs site
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: ./apps/docs/out

      - name: Compute tag
        id: tag
        run: |
          TAG=v$(date +"%Y%m%d%H%M%S")
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.tag.outputs.tag }}
          git push origin ${{ steps.tag.outputs.tag }}

      - name: Create release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          release_name: Release ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish docs to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/docs/out
