name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build installers and web
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build:web

      - name: Build docs (static export)
        run: |
          npm run build:docs || true

      - name: Build desktop installer
        run: |
          cd apps/desktop
          npx electron-builder --linux AppImage --win nsis --mac dmg
        shell: bash

      - name: Collect installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            dist/*.AppImage
            dist/*.exe
            dist/*.dmg
            dist/*.zip

  release:
    name: Create Release and Publish Pages
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download installers (linux)
        uses: actions/download-artifact@v4
        with:
          name: installers-ubuntu-latest
          path: ./dist

      - name: Download installers (windows)
        uses: actions/download-artifact@v4
        with:
          name: installers-windows-latest
          path: ./dist

      - name: Download installers (macos)
        uses: actions/download-artifact@v4
        with:
          name: installers-macos-latest
          path: ./dist

      - name: Compute tag
        id: tag
        run: |
          TAG=v$(date +"%Y%m%d%H%M%S")
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.tag.outputs.tag }}
          git push origin ${{ steps.tag.outputs.tag }}

      - name: Create release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          release_name: Release ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish docs to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/docs/out
